  int32 index = 1;
  int32 number = 2;
  string name = 3;
  int32 x = 4;
  int32 y = 5;
  int32 width = 6;
  int32 height = 7;
  repeated Zone zones = 8;
  string region_name = 9;
  bool boss_area = 10;
  bool victory_area = 11;
  float lighting = 12;
  float snow = 13;
  float sakura_leaves = 14;
}

message Chat {
  repeated ChatMessage messages = 1;
  repeated string blocked_usernames = 2;
  repeated string unblocked_usernames = 3;
  repeated string removed_senders = 4;
}

message ChatMessage {
  int32 id = 1;
  string sender = 2;
  repeated ChatMessageStyle style = 3;
  string text = 4;
}

message ClientPayload {
  HeroSelection hero_selection = 1;
  int32 sequence = 2;
  repeated Key keys = 3;
  MouseDown mouse_down = 4;
  string message = 5;
  Settings settings = 6;
  repeated string blocked_usernames = 7;
  repeated string unblocked_usernames = 8;
  ModToolsAction mod_tools_action = 9;
  ModToolsRequest mod_tools_request = 10;
  int32 ping = 11;
}

message ConnectionPayload {
  ConnectionType connection_type = 1;
  string username = 2;
  Settings settings = 3;
  QuestData quest_data = 4;
  string error = 5;
}

message Effect {
  int32 id = 1;
  bool removed = 2;
  EffectType effect_type = 3;
  float radius = 4;
  float input_angle = 5;
}

