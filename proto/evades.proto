message FramePayload {
  int32 sequence = 1;
  bool complete = 2;
  bool complete_global = 3;
  Area area = 4;
  Map map = 5;
  repeated Entity entities = 6;
  repeated Entity global_entities = 7;
  Chat chat = 8;
  Settings settings = 9;
  int32 self_id = 10;
  bool reset = 11;
  ModToolsResponse mod_tools_response = 12;
  QuestData quest_data = 13;
  int32 pong = 14;
  float tick_rate = 15;
  bytes x_entities = 16;
  bytes y_entities = 17;
  bytes xy_entities = 18;
  bytes xy_radius_entities = 19;
  repeated ServerDebugObject debug_objects = 20;
}

message Key {
  KeyEvent key_event = 1;
  KeyType key_type = 2;
}

message Map {
  int32 x = 1;
  int32 y = 2;
  int32 width = 3;
  int32 height = 4;
  repeated Zone zones = 5;
}

message ModToolsAccountResponse {
  float account_created_at = 1;
  repeated ModToolsActionData actions_received = 2;
  repeated ModToolsActionData actions_performed = 3;
  repeated string related_usernames = 4;
}

message ModToolsAction {
  ModToolsActionType type = 1;
  repeated string targets = 2;
  int32 duration = 3;
}

message ModToolsActionData {
  ModToolsActionDataType action_type = 1;
  string username = 2;
  string author = 3;
  float created_at = 4;
}

message ModToolsRequest {
  string target = 1;
}

message ModToolsResponse {
  ModToolsResponseType response_type = 1;
  string username = 2;
  ModToolsAccountResponse response = 3;
}

message MouseDown {
  bool updated = 1;
  int32 x = 2;
  int32 y = 3;
}

message QuestData {
  string region_name = 1;
  int32 area_index = 2;
  int32 completions = 3;
  int32 completions_required = 4;
  int32 completion_points = 5;
  int32 personal_points = 6;
  string extra_message = 7;
  bool player_completion_status = 8;
}

message ServerDebugObject {
  float x = 1;
  float y = 2;
  uint32 color = 3;
  string text = 4;
}

message Settings {
  enum DisplayEnergyBars {
    ALL = 0;
    YOURS = 1;
    OTHERS = 2;
    NONE = 3;
  }
  enum EnemyOutlines {
    DISABLED = 0;
    ENABLED = 1;
    ENABLED_DARK = 2;
    ENABLED_LIGHT = 3;
  }
  enum LeaderboardHeroesDisplay {
    OFF = 0;
    VISUAL = 1;
    TEXT = 2;
  }
  enum LightingMode {
    CLASSIC = 0;
    ENHANCED = 1;
  }
  enum TileMode {
    TILES = 0;
    NO_TILES = 1;
    TILES_DARK = 2;
    NO_TILES_DARK = 3;
  }

  bool updated = 1;
  bool profanity_filtering = 2;
  bool enable_mouse_movement = 3;
  bool toggle_mouse_movement = 4;
  EnemyOutlines enemy_outlines = 5;
  bool display_chat = 6;
  bool display_leaderboard = 7;
  LeaderboardHeroesDisplay display_leaderboard_heroes = 8;
  bool display_timer = 9;
  TileMode tile_mode = 10;
  bool reconnection = 11;
  bool confetti = 12;
  bool ability_particles = 13;
  bool cosmetic_effects = 14;
  float joystick_deadzone = 15;
  bool legacy_speed_units = 16;
  bool fading_effects = 17;
  float pellet_transparency = 18;
  bool background_objects = 19;
  DisplayEnergyBars display_energy_bars = 20;
  bool enemy_projectile_outlines = 21;
  bool detailed_hero_card_stats = 22;
  bool display_gameplay_hints = 23;
  float interface_scale = 24;
  bool display_performance_stats = 25;
  bool effect_blending = 26;
  bool enemies_on_minimap = 27;
  float minimap_entity_scale = 28;
  bool auto_prepare_abilities = 29;
  LightingMode lighting_mode = 30;
  bool see_direct_messages = 31;
  bool see_deleted_messages = 32;
  bool see_mod_actions = 33;
  bool see_muted_notifications = 34;
  bool hide_message_tag = 35;
  bool randomize_name = 36;
  bool show_regular_name = 37;
  bool prevent_run_logs = 38;
  bool prevent_mod_logs = 39;
}

message Zone {
  int32 x = 1;
  int32 y = 2;
  int32 width = 3;
  int32 height = 4;
  ZoneType type = 5;
  uint32 background_color = 6;
  TextureType texture = 7;
}

